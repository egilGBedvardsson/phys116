<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PHYS 116 · Demoportal</title>
  <script>
    // Ensure relative asset paths resolve correctly if URL is opened as /docs (without trailing slash).
    if (window.location.pathname.endsWith("/docs")) {
      window.location.replace(`${window.location.pathname}/${window.location.search}${window.location.hash}`);
    }
  </script>
  <link rel="stylesheet" href="./assets/design.css" />
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [["\\(", "\\)"]],
        displayMath: [["\\[", "\\]"]]
      },
      options: {
        skipHtmlTags: ["script", "noscript", "style", "textarea", "pre", "code"]
      }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body class="portal-body">
  <main class="page">
    <section class="finder-window">
      <header class="window-bar" role="banner">
        <div class="window-title-wrap">
          <p class="window-subtitle">PHYS 116</p>
          <h1 class="window-title">Interaktiv dokumentleser</h1>
        </div>
        <p class="window-path" id="windowPath">PHYS 116 / Hjem</p>
      </header>

      <section class="window-main">
        <aside class="sidebar">
          <div class="sidebar-top">
            <img class="sidebar-logo" src="./assets/UiB_PositivEmblem.png" alt="UiB-logo" />
            <div>
              <p class="sidebar-school">Universitetet i Bergen</p>
              <p class="sidebar-course">PHYS 116</p>
            </div>
          </div>

          <p class="sidebar-label">Innhold</p>
          <nav class="demo-list" aria-label="Demoliste">
            <button class="demo-btn" data-demo="home">Hjem</button>
            <div class="folder" data-folder="demos" data-open="false">
              <button class="folder-toggle" type="button" aria-expanded="false" aria-controls="demoFolderList">
                <span class="folder-caret" aria-hidden="true">></span>
                <span>Demoer</span>
              </button>
              <div class="folder-list" id="demoFolderList" hidden>
                <button class="demo-btn" data-demo="nyquist">Nyquist</button>
                <button class="demo-btn" data-demo="firkantsignal">Konjugatsymmetri</button>
                <button class="demo-btn" data-demo="fir">FIR-filter</button>
                <button class="demo-btn" data-demo="pz">Pol-null</button>
              </div>
            </div>
          </nav>
        </aside>

        <section class="reader">
          <div class="reader-toolbar">
            <p class="reader-breadcrumb" id="readerBreadcrumb">Hjem</p>
            <a id="openExternal" class="open-link" href="#" target="_blank" rel="noopener noreferrer" hidden>
              Åpne demo i ny fane
            </a>
          </div>

          <article class="card" id="viewerCard">
            <div class="viewer-head">
              <h2 class="viewer-title" id="viewerTitle">Hjem</h2>
            </div>
            <div class="viewer-stage">
              <div class="stage-doc">
                <p class="doc-editor-label">Dokumenttekst</p>
                <div id="docContent" class="doc-content"></div>
              </div>
              <div class="stage-demo">
                <div class="empty" id="emptyState"></div>
                <iframe id="demoFrame" title="Demo"></iframe>
              </div>
            </div>
          </article>
        </section>
      </section>
    </section>
  </main>
  <button id="toTopBtn" class="to-top-btn" type="button" aria-label="Til toppen">
    Til toppen
  </button>

  <script>
    // Central registry for navigation, iframe source, and document fragments.
    const demos = {
      home: {
        title: "Hjem",
        path: "PHYS 116 / Hjem",
        src: null,
        doc: "./content/home.html"
      },
      nyquist: {
        title: "Sampling, Nyquist og folding",
        path: "PHYS 116 / Demoer / Nyquist Chirp",
        src: "./demos/nyquist_chirp_demo.html",
        doc: "./content/nyquist.html"
      },
      firkantsignal: {
        title: "Firkantsignal og konjugatsymmetri",
        path: "PHYS 116 / Demoer / Firkantsignal og konjugatsymmetri",
        src: "./demos/firkantsignal_konjugatsymmetri_demo.html",
        doc: "./content/firkantsignal_konjugatsymmetri.html"
      },
      fir: {
        title: "Finite Impulse Respons Filter",
        path: "PHYS 116 / Demoer / FIR-filter",
        src: "./demos/FIR_demo.html",
        doc: "./content/fir.html"
      },
      pz: {
        title: "Poler, nuller og frekvensrespons",
        path: "PHYS 116 / Demoer / Pol-null-editor",
        src: "./demos/pz_editor_demo.html",
        doc: "./content/pz.html"
      }
    };

    const buttons = Array.from(document.querySelectorAll(".demo-btn"));
    const viewerTitle = document.getElementById("viewerTitle");
    const docContent = document.getElementById("docContent");
    const emptyState = document.getElementById("emptyState");
    const frame = document.getElementById("demoFrame");
    const openExternal = document.getElementById("openExternal");
    const readerBreadcrumb = document.getElementById("readerBreadcrumb");
    const windowPath = document.getElementById("windowPath");
    const toTopBtn = document.getElementById("toTopBtn");
    const demosFolder = document.querySelector('[data-folder="demos"]');
    const demosFolderToggle = demosFolder ? demosFolder.querySelector(".folder-toggle") : null;
    const demosFolderList = demosFolder ? demosFolder.querySelector(".folder-list") : null;
    let frameResizeObserver = null;
    let lastMeasuredFrameHeight = 0;
    let docLoadToken = 0;
    const docCache = new Map();

    function typesetDocContent() {
      if (window.MathJax && typeof window.MathJax.typesetPromise === "function") {
        return window.MathJax.typesetPromise([docContent]).catch(() => {});
      }
      return Promise.resolve();
    }

    // Fetches per-demo document markup and avoids stale async writes via token checks.
    async function renderDocContent(key) {
      const demo = demos[key] || demos.home;
      const docPath = demo.doc || demos.home.doc;
      const token = ++docLoadToken;
      docContent.innerHTML = "<p class=\"doc-muted\">Laster dokument...</p>";

      let markup = docCache.get(docPath);
      if (markup === undefined) {
        try {
          const response = await fetch(docPath);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          markup = await response.text();
          docCache.set(docPath, markup);
        } catch (error) {
          markup = "<p class=\"doc-muted\">Kunne ikke laste dokumentteksten.</p>";
        }
      }

      if (token !== docLoadToken) return;
      docContent.innerHTML = markup;
      await typesetDocContent();
    }

    function setDemosFolderOpen(open) {
      if (!demosFolder || !demosFolderToggle || !demosFolderList) return;
      demosFolder.dataset.open = open ? "true" : "false";
      demosFolderToggle.setAttribute("aria-expanded", open ? "true" : "false");
      demosFolderList.hidden = !open;
    }

    function updateFrameHeight() {
      try {
        const doc = frame.contentDocument;
        if (!doc) return;

        // Measure the actual demo container to avoid feedback loops with iframe viewport height.
        const demoShell = doc.querySelector(".demo-shell");
        const html = doc.documentElement;
        const body = doc.body;
        const nextHeight = Math.ceil(
          demoShell
            ? demoShell.getBoundingClientRect().height
            : Math.max(
                body ? body.scrollHeight : 0,
                html ? html.scrollHeight : 0
              )
        );

        if (nextHeight > 0 && Math.abs(nextHeight - lastMeasuredFrameHeight) > 2) {
          frame.style.height = `${nextHeight}px`;
          lastMeasuredFrameHeight = nextHeight;
        }
      } catch (error) {
        // Same-origin demos are expected; ignore if frame is not readable.
      }
    }

    // Keeps iframe height synced to demo content after load and dynamic redraws.
    function connectFrameAutoHeight() {
      if (frameResizeObserver) {
        frameResizeObserver.disconnect();
        frameResizeObserver = null;
      }

      const doc = frame.contentDocument;
      if (!doc) return;

      updateFrameHeight();
      window.requestAnimationFrame(updateFrameHeight);
      window.setTimeout(updateFrameHeight, 120);
      window.setTimeout(updateFrameHeight, 420);

      if ("ResizeObserver" in window) {
        frameResizeObserver = new ResizeObserver(updateFrameHeight);
        const observedTarget = doc.querySelector(".demo-shell") || doc.body || doc.documentElement;
        if (observedTarget) frameResizeObserver.observe(observedTarget);
      }
    }

    frame.addEventListener("load", connectFrameAutoHeight);
    window.addEventListener("resize", updateFrameHeight, { passive: true });

    function setActiveButton(key) {
      buttons.forEach(btn => {
        btn.classList.toggle("active", btn.dataset.demo === key);
      });
    }

    function loadDemo(key, pushHash = true) {
      const demo = demos[key];
      if (!demo) return;

      viewerTitle.textContent = demo.title;
      readerBreadcrumb.textContent = demo.path;
      windowPath.textContent = demo.path;
      renderDocContent(key);
      if (key !== "home") {
        setDemosFolderOpen(true);
      }

      if (demo.src) {
        frame.style.display = "block";
        emptyState.hidden = true;

        if (frame.getAttribute("src") !== demo.src) {
          frame.setAttribute("src", demo.src);
        } else {
          updateFrameHeight();
        }

        openExternal.hidden = false;
        openExternal.href = demo.src;
      } else {
        if (frameResizeObserver) {
          frameResizeObserver.disconnect();
          frameResizeObserver = null;
        }
        frame.style.display = "none";
        frame.style.height = "0";
        lastMeasuredFrameHeight = 0;
        frame.removeAttribute("src");
        emptyState.hidden = false;
        emptyState.innerHTML = "Velg et dokument fra sidepanelet for å starte.";
        openExternal.hidden = true;
        openExternal.removeAttribute("href");
      }

      setActiveButton(key);

      if (pushHash) {
        const params = new URLSearchParams(location.hash.slice(1));
        params.set("demo", key);
        location.hash = params.toString();
      }
    }

    buttons.forEach(btn => {
      btn.addEventListener("click", () => {
        loadDemo(btn.dataset.demo);
      });
    });

    if (demosFolderToggle && demosFolderList) {
      demosFolderToggle.addEventListener("click", () => {
        setDemosFolderOpen(demosFolderList.hidden);
      });
    }

    function loadFromHash() {
      const params = new URLSearchParams(location.hash.slice(1));
      let key = params.get("demo");
      if (key === "square") {
        key = "firkantsignal";
      }
      if (!key || key === "home") {
        setDemosFolderOpen(false);
      }
      if (key && demos[key]) {
        loadDemo(key, false);
      } else {
        loadDemo("home", false);
      }
    }

    window.addEventListener("hashchange", loadFromHash);
    loadFromHash();

    function updateToTopButton() {
      const shouldShow = window.scrollY > 280;
      toTopBtn.classList.toggle("visible", shouldShow);
    }

    toTopBtn.addEventListener("click", () => {
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    window.addEventListener("scroll", updateToTopButton, { passive: true });
    updateToTopButton();
  </script>
</body>
</html>
